</head>
<body>

            <div class="about">Necmettin Erbakan Üniversitesinde okuyor. AI geliştirme en büyük ilgi alanlarından biridir. En sevdiği yemek zeytinyağlı yaprak sarma. Hobileri ise gezmek, müzik dinlemek, spora gitmek ve dizi izlemektir. Favori dizisi ise Son Yaz'dır.</div>
        </div>
        <div class="card-footer">
        </div>
    </div>
    
</body>
</html>
